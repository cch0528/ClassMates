<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachUp HK — 登入</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+HK:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="loginwrap">
  <div class="logo">Coach<span>Up</span> HK</div>
  <div class="tag">興趣班・搵教練・即刻book</div>

  <div class="rolepick" id="modepick">
    <div class="rp on" data-m="demo">🧪 Demo帳戶</div>
    <div class="rp" data-m="real" style="grid-column:span 2">🔐 真實帳戶(Firebase)</div>
  </div>

  <div class="rolepick" id="rolepick">
    <div class="rp on" data-r="student">🙋 學員</div>
    <div class="rp" data-r="coach">🏋️ 教練</div>
    <div class="rp" data-r="admin">🛠️ Admin</div>
  </div>

  <div class="frm">
    <label>Email</label>
    <input id="email" type="email" placeholder="you@email.com" autocomplete="username">
    <label>密碼</label>
    <input id="pw" type="password" placeholder="••••" autocomplete="current-password">
    <label id="nameRow">你嘅名/稱呼 <small style="font-weight:400">(只註冊時需要)</small></label>
    <input id="regName" placeholder="例:陳大文">
    <label id="agreeRow" style="display:flex;flex-direction:row;align-items:center;gap:8px;font-size:.82rem;color:var(--ink-2)">
      <input type="checkbox" id="agreeTerms" style="width:auto"> 我已閱讀並同意 <a href="terms.html" target="_blank" style="color:var(--green)">條款及細則</a>(只註冊時需要)
    </label>
    <button class="btn primary block" id="loginBtn">登入</button>
    <button class="btn ghost block" id="regBtn">註冊新帳戶</button>
  </div>

  <div class="hint" id="demoHint">
    <b>Demo帳戶</b>(密碼一律 1234):<br>
    學員 student@demo.com<br>
    教練 coach@demo.com<br>
    Admin admin@demo.com<br><br>
    <span style="opacity:.75">Demo mode:資料存喺本機。想reset所有資料 → </span>
    <a href="#" id="resetLink" style="color:var(--green)">撳呢度</a>
  </div>
  <div class="hint" id="realHint" style="display:none">
    真實帳戶會經Firebase Authentication建立,密碼最少6個字。教練註冊後需等Admin喺後台審批先會喺平台出現。
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="app.js"></script>
<script>
let role = "student";
let mode = "demo";
const dest = r => ({student:"student.html", coach:"coach.html", admin:"admin.html"}[r]);

document.querySelectorAll("#rolepick .rp").forEach(el=>{
  el.onclick = ()=>{
    document.querySelectorAll("#rolepick .rp").forEach(x=>x.classList.remove("on"));
    el.classList.add("on"); role = el.dataset.r;
  };
});
document.querySelectorAll("#modepick .rp").forEach(el=>{
  el.onclick = ()=>{
    document.querySelectorAll("#modepick .rp").forEach(x=>x.classList.remove("on"));
    el.classList.add("on"); mode = el.dataset.m;
    document.getElementById("demoHint").style.display = mode==="demo" ? "" : "none";
    document.getElementById("realHint").style.display = mode==="real" ? "" : "none";
  };
});

/* ---------- DEMO mode (local) ---------- */
function demoLogin(){
  const email = document.getElementById("email").value.trim().toLowerCase();
  const pw = document.getElementById("pw").value;
  const db = DB.get();
  const u = db.users.find(x=>x.email===email && x.pw===pw);
  if(!u) return toast("Email或密碼唔啱");
  if(u.role!==role) return toast(`呢個帳戶係「${{student:"學員",coach:"教練",admin:"Admin"}[u.role]}」,請揀返啱嘅身份`);
  if(u.status==="disabled") return toast("帳戶已被停用,請聯絡平台");
  Session.set({uid:u.uid, role:u.role, name:u.name, mode:"demo"});
  location.href = dest(u.role);
}
function demoRegister(){
  const email = document.getElementById("email").value.trim().toLowerCase();
  const pw = document.getElementById("pw").value;
  const name = document.getElementById("regName").value.trim();
  if(!email || !pw) return toast("填埋Email同密碼先");
  if(!name) return toast("填埋你嘅名先");
  if(!document.getElementById("agreeTerms").checked) return toast("要先同意條款及細則");
  if(role==="admin") return toast("Admin帳戶唔開放註冊");
  const db = DB.get();
  if(db.users.find(x=>x.email===email)) return toast("呢個Email已註冊");
  const uid = DB.uid();
  DB.update(d=>{
    d.users.push({uid, role, name, email, pw, phone:"", status:"active", agreedTermsAt:new Date().toISOString()});
    if(role==="coach"){
      d.coaches.push({uid, name, em:"🏅", cat:"other", sub:"", region:d.regions[0], bio:"", quals:[], lessons:0,
        rating:0, ratingCount:0, bookingCount:0, approved:false, confirmMode:"default",
        featured:{pinned:false,pinOrder:0}, fps:"", payme:"", classes:[]});
    }
  });
  Session.set({uid, role, name, mode:"demo"});
  toast(role==="coach" ? "已註冊!教練帳戶需等Admin審批先會喺平台出現" : "註冊成功!");
  setTimeout(()=>location.href = dest(role), 900);
}

/* ---------- REAL mode (Firebase Auth + Firestore profile) ---------- */
async function realLogin(){
  const email = document.getElementById("email").value.trim().toLowerCase();
  const pw = document.getElementById("pw").value;
  if(!email||!pw) return toast("填埋Email同密碼先");
  try{
    const cred = await fbAuth.signInWithEmailAndPassword(email, pw);
    const profile = await fbGetProfile(cred.user.uid);
    if(!profile) return toast("搵唔到帳戶資料,請聯絡平台");
    if(profile.role!==role) return toast(`呢個帳戶係「${{student:"學員",coach:"教練",admin:"Admin"}[profile.role]}」,請揀返啱嘅身份`);
    Session.set({uid:cred.user.uid, role:profile.role, name:profile.name, mode:"real"});
    // 同步落local DB,等其餘頁面(教練/admin management)睇到呢個user
    DB.update(d=>{
      if(!d.users.find(x=>x.uid===cred.user.uid)){
        d.users.push({uid:cred.user.uid, role:profile.role, name:profile.name, email, pw:"", status:"active"});
        if(profile.role==="coach" && !d.coaches.find(c=>c.uid===cred.user.uid)){
          d.coaches.push({uid:cred.user.uid, name:profile.name, em:"🏅", cat:"other", sub:"", region:d.regions[0], bio:"", quals:[], lessons:0,
            rating:0, ratingCount:0, bookingCount:0, approved:false, confirmMode:"default",
            featured:{pinned:false,pinOrder:0}, fps:"", payme:"", classes:[]});
        }
      }
    });
    location.href = dest(profile.role);
  }catch(e){ toast("登入失敗:"+(e.message||e.code)); }
}
async function realRegister(){
  const email = document.getElementById("email").value.trim().toLowerCase();
  const pw = document.getElementById("pw").value;
  const name = document.getElementById("regName").value.trim();
  if(!email||!pw) return toast("填埋Email同密碼先");
  if(pw.length<6) return toast("密碼最少6個字");
  if(!name) return toast("填埋你嘅名先");
  if(!document.getElementById("agreeTerms").checked) return toast("要先同意條款及細則");
  if(role==="admin") return toast("Admin帳戶唔開放註冊");
  try{
    const cred = await fbAuth.createUserWithEmailAndPassword(email, pw);
    await fbCreateProfile(cred.user.uid, {name, email, role, agreedTermsAt:new Date().toISOString()});
    DB.update(d=>{
      d.users.push({uid:cred.user.uid, role, name, email, pw:"", status:"active", agreedTermsAt:new Date().toISOString()});
      if(role==="coach"){
        d.coaches.push({uid:cred.user.uid, name, em:"🏅", cat:"other", sub:"", region:d.regions[0], bio:"", quals:[], lessons:0,
          rating:0, ratingCount:0, bookingCount:0, approved:false, confirmMode:"default",
          featured:{pinned:false,pinOrder:0}, fps:"", payme:"", classes:[]});
      }
    });
    Session.set({uid:cred.user.uid, role, name, mode:"real"});
    toast(role==="coach" ? "已註冊!教練帳戶需等Admin審批先會喺平台出現" : "註冊成功!");
    setTimeout(()=>location.href = dest(role), 900);
  }catch(e){ toast("註冊失敗:"+(e.message||e.code)); }
}

document.getElementById("loginBtn").onclick = ()=> mode==="demo" ? demoLogin() : realLogin();
document.getElementById("regBtn").onclick = ()=> mode==="demo" ? demoRegister() : realRegister();

document.getElementById("resetLink").onclick = e=>{
  e.preventDefault();
  if(confirm("Reset晒所有demo資料?")){ resetDB(); Session.clear(); toast("已reset"); }
};
</script>
</body>
</html>
